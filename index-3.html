document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

v style=\"background:#F3F6F1;border:1px solid #DEE7DA;border-radius:20px;padding:24px 28px;margin-bottom:30px\">\n      <div style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:16px\">\n        <div>\n          <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8FA286;font-weight:700;margin-bottom:6px\">Annual income<\u002Fdiv>\n          <div style=\"display:flex;align-items:baseline;gap:10px\">\n            <span style=\"font-family:'Cormorant Garamond',serif;font-size:46px;font-weight:600;color:#5E7257;line-height:1\">{{ totalEarnedLabel }}<\u002Fspan>\n            <div style=\"position:relative\">\n              <button onclick=\"{{ onToggleAnnualGoal }}\" style=\"display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #DCE7D6;border-radius:9px;padding:7px 12px;font-size:13.5px;font-weight:700;color:#6E7C66;cursor:pointer\">Goal {{ totalGoalLabel }} <span style=\"color:#A7B6A0;font-size:11px\">▾<\u002Fspan><\u002Fbutton>\n              <sc-if value=\"{{ isAnnualGoalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"position:absolute;top:calc(100% + 6px);left:0;width:160px;background:#fff;border:1px solid #DCE7D6;border-radius:12px;box-shadow:0 14px 34px rgba(74,68,61,.16);padding:6px;z-index:50;max-height:300px;overflow:auto\">\n                  <sc-for list=\"{{ annualGoalOptions }}\" as=\"g\" hint-placeholder-count=\"8\">\n                    <div onclick=\"{{ g.onSelect }}\" style=\"display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer\" style-hover=\"background:#EEF3EB\">\n                      <div style=\"{{ g.boxStyle }}\"><sc-if value=\"{{ g.selected }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#fff;font-size:10px;font-weight:700;line-height:1\">✓<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                      <span style=\"font-size:13.5px;color:#544E46;font-weight:600\">{{ g.label }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:right\">\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:#7E8E76;line-height:1\">{{ totalPctInt }}%<\u002Fdiv>\n          <div style=\"font-size:13px;color:#92897C;margin-top:2px\">{{ totalStatus }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:18px;background:#E4E9DF;border-radius:999px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(74,68,61,.07)\">\n        <div style=\"height:100%;border-radius:999px;background:linear-gradient(90deg,#9FB39A,#D9A79B,#D2A579,#A4B7C4);transition:width .6s cubic-bezier(.2,.8,.2,1);min-width:0;width: {{ totalPct }}%\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Seasons grid -->\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(440px,1fr));gap:20px\">\n      <sc-for list=\"{{ seasonsView }}\" as=\"se\" hint-placeholder-count=\"4\">\n        <div style=\"background:#fff;border:1px solid #EEE7DD;border-radius:18px;padding:22px 24px 14px;box-shadow:0 1px 3px rgba(74,68,61,.05)\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:3px\">\n            <div style=\"display:flex;align-items:center;gap:11px\">\n              <span style=\"{{ se.dotStyle }}\"><\u002Fspan>\n              <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:30px;color:#4A443D;margin:0;line-height:1\">{{ se.name }}<\u002Fh3>\n            <\u002Fdiv>\n            <span style=\"{{ se.badgeStyle }}\">{{ se.countLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#B0A698;font-weight:600;margin-bottom:14px\">{{ se.sub }}<\u002Fdi Fsc-if>\n            <\u002Fdiv>\n            <div style=\"position:relative\">\n              <div style=\"font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#A89F94;font-weight:700;margin-bottom:6px\">Booking channels<\u002Fdiv>\n              <button onclick=\"{{ se.onToggleChannels }}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:6px;background:#FBF8F4;border:1px solid #E7DFD5;border-radius:10px;padding:9px 11px;text-align:left;cursor:pointer\">\n                <span style=\"font-size:13px;font-weight:600;color:#544E46;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ se.channelsSummary }}<\u002Fspan>\n                <span style=\"color:#B6AC9E;font-size:11px;flex-shrink:0\">▾<\u002Fspan>\n              <\u002Fbutton>\n              <sc-if value=\"{{ se.isChannelsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"position:absolute;top:calc(100% + 6px);left:0;right:0;min-width:190px;background:#fff;border:1px solid #ECE4D9;border-radius:12px;box-shadow:0 14px 34px rgba(74,68,61,.16);padding:6px;z-index:50\">\n                  <sc-for list=\"{{ se.channelOptions }}\" as=\"opt\" hint-placeholder-count=\"5\">\n                    <div onclick=\"{{ opt.onToggle }}\" style=\"display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer\" style-hover=\"background:#F6F1EA\">\n                      <div style=\"{{ opt.boxStyle }}\"><sc-if value=\"{{ opt.selected }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#fff;font-size:10px;font-weight:700;line-height:1\">✓<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                      <span style=\"font-size:13.5px;color:#544E46;font-weight:500\">{{ opt.label }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Per-season income tracker -->\n          <sc-if value=\"{{ showIncome }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"{{ se.incomeBoxStyle }}\">\n            <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:11px\">\n              <div style=\"display:flex;align-items:baseline;gap:7px\">\n                <span style=\"{{ se.earnedStyle }}\">{{ se.earnedLabel }}<\u002Fspan>\n                <span style=\"font-size:13px;color:#93897C;font-weight:600\">of {{ se.goalLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"position:relative\">\n                <button onclick=\"{{ se.onToggleGoal }}\" style=\"display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #E2DACF;border-radius:9px;padding:6px 10px;font-size:12.5px;font-weight:700;color:#6E665B;cursor:pointer\">Goal {{ se.goalLabel }} <span style=\"color:#B6AC9E;font-size:11px\">▾<\u002Fspan><\u002Fbutton>\n                <sc-if value=\"{{ se.isGoalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"position:absolute;top:calc(100% + 6px);right:0;width:150px;background:#fff;border:1px solid #ECE4D9;border-radius:12px;box-shadow:0 14px 34px rgba(74,68,61,.16);padding:6px;z-index:50\">\n                    <sc-for list=\"{{ se.goalOptions }}\" as=\"g\" hint-placeholder-count=\"6\">\n                      <div onclick=\"{{ g.onSelect }}\" style=\"display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer\" style-hover=\"background:#F6F1EA\">\n                        <div style=\"{{ g.boxStyle }}\"><sc-if value=\"{{ g.selected }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#fff;font-size:10px;font-weight:700;line-height:1\">✓<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                        <span style=\"font-size:13.5px;color:#544E46;font-weight:600\">{{ g.label }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"height:14px;background:#EBE5DB;border-radius:999px;overflow:hidden\">\n              <div style=\"{{ se.fillStyle }}\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:11px\">\n              <div style=\"display:flex;align-items:center;background:#fff;border:1px solid #E2DACF;border-radius:9px;padding:0 10px;height:36px\">\n                <span style=\"color:#9AA593;font-weight:700;font-size:13.5px\">$<\u002Fspan>\n                <input value=\"{{ se.addAmount }}\" onchange=\"{{ se.onAddChange }}\" onkeydown=\"{{ se.onAddKey }}\" placeholder=\"0\" inputmode=\"numeric\" style=\"border:none;background:none;width:62px;font-size:13.5px;font-weight:600;color:#544E46;padding:0 5px;height:36px\">\n              <\u002Fdiv>\n              <button onclick=\"{{ se.addCustom }}\" style=\"{{ se.addBtnStyle }}\">Log<\u002Fbutton>\n              <sc-for list=\"{{ se.quickChips }}\" as=\"chip\" hint-placeholder-count=\"2\">\n                <button onclick=\"{{ chip.onClick }}\" style=\"background:#fff;border:1px solid #E2DACF;border-radius:999px;padding:6px 11px;font-size:12.5px;font-weight:600;color:#6E665B;cursor:pointer\" style-hover=\"background:#F6F1EA\">{{ chip.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n              <button onclick=\"{{ se.resetIncome }}\" style=\"margin-left:auto;background:none;border:none;color:#B3A99D;font-size:12.5px;cursor:pointer;text-decoration:underline;text-underline-offset:3px\">Reset<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-for list=\"{{ se.tasks }}\" as=\"task\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ task.onToggle }}\" style=\"display:flex;gap:12px;align-items:flex-start;padding:10px 0;cursor:pointer;border-top:1px solid #F2ECE3\">\n              <div style=\"{{ task.boxStyle }}\"><sc-if value=\"{{ task.checked }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#fff;font-size:12px;font-weight:700;line-height:1\">✓<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n              <div style=\"flex:1;padding-top:1px\">\n                <span style=\"{{ task.textStyle }}\">{{ task.label }}<\u002Fspan>\n                <sc-if value=\"{{ task.isChannel }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-block;margin-left:8px;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:#A89F94;background:#F2EDE6;padding:2px 8px;border-radius:999px;vertical-align:middle;font-weight:600\">{{ task.channelLabel }}<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- Footer progress -->\n    <div style=\"margin-top:30px;background:#fff;border:1px solid #EEE7DD;border-radius:16px;padding:20px 24px;display:flex;flex-wrap:wrap;align-items:center;gap:18px\">\n      <div style=\"flex:1;min-width:200px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px\">\n          <span style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#A89F94\">Checklist progress<\u002Fspan>\n          <span style=\"font-size:13px;color:#7C7368;font-weight:600\">{{ progressLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"height:9px;background:#EFE9E0;border-radius:999px;overflow:hidden\">\n          <div style=\"{{ progressFillStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ resetChecklist }}\" style=\"background:none;border:1px solid #E7DFD5;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;color:#8A8175;cursor:pointer\" style-hover=\"background:#F6F1EA\">Clear all checks<\u002Fbutton>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ anyOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeDropdown }}\" style=\"position:fixed;inset:0;z-index:40\"><\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;primary&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#93A98C&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;showIncome&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Theme&quot;}}\">\nconst KEY = 'fmp_seasonal_checklist_perseason_v2';\n\nconst CHANNELS = [\n  { key: 'instagram', label: 'Instagram' },\n  { key: 'tiktok', label: 'TikTok' },\n  { key: 'email', label: 'Email list' },\n  { key: 'collaborations', label: 'Collaborations' },\n  { key: 'metaAds', label: 'Meta ads' },\n];\n\nconst CHTASK = {\n  instagram: (s) => `Share ${s} sneak peeks + 2 reels on Instagram`,\n  tiktok: (s) => `Post a ${s} \\u201cday in the life\\u201d on TikTok`,\n  email: (s) => `Email your list the ${s} session announcement`,\n  collaborations: (s) => `Line up one ${s} collaboration (venue or brand)`,\n  metaAds: (s) => `Run a small Meta ad promoting ${s} sessions`,\n};\n\nconst SESSIONS = [\n  { key: 'family', label: 'Family sessions' },\n  { key: 'newborn', label: 'Newborn sessions' },\n  { key: 'maternity', label: 'Maternity sessions' },\n  { key: 'studio', label: 'Studio sessions' },\n  { key: 'outdoorMinis', label: 'Outdoor minis' },\n  { key: 'studioMinis', label: 'Studio minis' },\n];\n\nconst SHORT = {\n  family: 'Family', newborn: 'Newborn', maternity: 'Maternity',\n  studio: 'Studio', outdoorMinis: 'Outdoor minis', studioMinis: 'Studio minis',\n};\n\nconst SEASONS = [\n  {\n    key: 'spring', name: 'Spring', sub: 'March \\u2013 May', accent: '#9FB39A', tint: '#ECF1EA', defGoal: 1500,\n    core: [\n      'Set spring + Mother\\u2019s Day mini dates and pricing',\n      'Refresh your portfolio and website with recent work',\n      'Reconnect with last year\\u2019s maternity & newborn clients',\n      'Open online booking for spring dates',\n    ],\n    defSessions: ['maternity', 'outdoorMinis'],\n  },\n  {\n    key: 'summer', name: 'Summer', sub: 'June \\u2013 August', accent: '#D9A79B', tint: '#F6ECE8', defGoal: 1000,\n    core: [\n      'Scout and lock fall mini-session locations & dates',\n      'Batch-create your fall marketing content now',\n      'Gather and post recent client testimonials',\n      'Open an early-bird fall waitlist',\n    ],\n    defSessions: ['family', 'outdoorMinis'],\n  },\n  {\n    key: 'fall', name: 'Fall', sub: 'September \\u2013 November', accent: '#D2A579', tint: '#F4EADC', defGoal: 2500,\n    core: [\n      'Launch and fill your fall mini sessions',\n      'Remind clients about holiday card & gift sessions',\n      'Share daily sneak peeks during mini season',\n      'Upsell prints, albums & wall art at gallery reveals',\n    ],\n    defSessions: ['outdoorMinis', 'family'],\n  },\n  {\n    key: 'winter', name: 'Winter', sub: 'December \\u2013 February', accent: '#A4B7C4', tint: '#E9EFF2', defGoal: 1000,\n    core: [\n      'Promote newborn & studio sessions for new babies',\n      'Send year-end thank-yous to your clients',\n      'Review the year\\u2019s numbers and set next year\\u2019s goal',\n      'Plan Q1 maternity & Valentine\\u2019s minis',\n    ],\n    defSessions: ['newborn', 'studio'],\n  },\n];\n\nconst GOALS = [500, 1000, 2500, 5000, 7500, 10000, 15000, 25000, 50000];\nconst ANNUAL_GOALS = [8000, 12000, 16000, 24000, 32000, 50000, 75000, 100000, 150000, 200000];\n\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let saved = null;\n    try { const raw = localStorage.getItem(KEY); if (raw) saved = JSON.parse(raw); } catch (e) {}\n    const defGoals = {}, zero = {}, blank = {}, defSessions = {}, defChannels = {};\n    SEASONS.forEach((se) => {\n      defGoals[se.key] = se.defGoal;\n      zero[se.key] = 0;\n      blank[se.key] = '';\n      defSessions[se.key] = se.defSessions.slice();\n      defChannels[se.key] = ['instagram', 'email'];\n    });\n    this.state = {\n      annualGoal: (saved && saved.annualGoal) || 16000,\n      seasonSessions: (saved && saved.seasonSessions) || defSessions,\n      seasonChannels: (saved && saved.seasonChannels) || defChannels,\n      seasonGoals: (saved && saved.seasonGoals) || defGoals,\n      seasonIncome: (saved && saved.seasonIncome) || zero,\n      checked: (saved && saved.checked) || {},\n      addAmounts: blank,\n      openDropdown: null,\n    };\n  }\n\n  componentDidUpdate() {\n    const s = this.state;\n    try {\n      localStorage.setItem(KEY, JSON.stringify({\n        annualGoal: s.annualGoal,\n        seasonSessions: s.seasonSessions, seasonChannels: s.seasonChannels,\n        seasonGoals: s.seasonGoals, seasonIncome: s.seasonIncome, checked: s.checked,\n      }));\n    } catch (e) {}\n  }\n\n  money(n) { return '$' + Math.round(n).toLocaleString('en-US'); }\n  primary() { return this.props.primary || '#93A98C'; }\n\n  miniBox(sel) {\n    const p = this.primary();\n    return `width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;border:1.5px solid ${sel ? p : '#D8D0C6'};background:${sel ? p : '#fff'}`;\n  }\n\n  toggleDropdown(name) {\n    this.setState((st) => ({ openDropdown: st.openDropdown === name ? null : name }));\n  }\n  closeDropdown = () => this.setState({ openDropdown: null });\n\n  toggleSeasonArr(field, seasonKey, key) {\n    this.setState((st) => {\n      const map = Object.assign({}, st[field]);\n      const arr = (map[seasonKey] || []).slice();\n      const i = arr.indexOf(key);\n      if (i >= 0) arr.splice(i, 1); else arr.push(key);\n      map[seasonKey] = arr;\n      return { [field]: map };\n    });\n  }\n\n  chooseAnnualGoal(v) {\n    this.setState({ annualGoal: v, openDropdown: null });\n  }\n\n  chooseGoal(seasonKey, v) {\n    this.setState((st) => ({ seasonGoals: Object.assign({}, st.seasonGoals, { [seasonKey]: v }), openDropdown: null }));\n  }\n\n  toggleTask(id) {\n    this.setState((st) => ({ checked: Object.assign({}, st.checked, { [id]: !st.checked[id] }) }));\n  }\n\n  onAddChange(seasonKey, e) {\n    const v = e.target.value.replace(/[^0-9]/g, '');\n    this.setState((st) => ({ addAmounts: Object.assign({}, st.addAmounts, { [seasonKey]: v }) }));\n  }\n  addCustom(seasonKey) {\n    const n = parseInt(this.state.addAmounts[seasonKey] || '0', 10);\n    if (n > 0) this.setState((st) => ({\n      seasonIncome: Object.assign({}, st.seasonIncome, { [seasonKey]: (st.seasonIncome[seasonKey] || 0) + n }),\n      addAmounts: Object.assign({}, st.addAmounts, { [seasonKey]: '' }),\n    }));\n  }\n  addQuick(seasonKey, n) {\n    this.setState((st) => ({ seasonIncome: Object.assign({}, st.seasonIncome, { [seasonKey]: (st.seasonIncome[seasonKey] || 0) + n }) }));\n  }\n  resetIncome(seasonKey) {\n    this.setState((st) => ({ seasonIncome: Object.assign({}, st.seasonIncome, { [seasonKey]: 0 }) }));\n  }\n  resetChecklist = () => this.setState({ checked: {} });\n\n  taskView(id, label, checked, channelLabel) {\n    const p = this.primary();\n    return {\n      id, label, checked,\n      onToggle: () => this.toggleTask(id),\n      isChannel: !!channelLabel,\n      channelLabel: channelLabel || '',\n      boxStyle: `width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;border:1.5px solid ${checked ? p : '#D8D0C6'};background:${checked ? p : '#fff'}`,\n      textStyle: checked\n        ? 'font-size:14.5px;line-height:1.45;font-weight:500;color:#B7AEA2;text-decoration:line-through'\n        : 'font-size:14.5px;line-height:1.45;font-weight:500;color:#544E46',\n    };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const checked = s.checked || {};\n    const showIncome = this.props.showIncome !== false;\n\n    let total = 0, done = 0, totalGoal = 0, totalIncome = 0;\n\n    const seasonsView = SEASONS.map((se) => {\n      const seSessions = s.seasonSessions[se.key] || [];\n      const seChannels = s.seasonChannels[se.key] || [];\n\n      const tasks = [];\n      se.core.forEach((label, i) => {\n        const id = se.key + '|core|' + i;\n        tasks.push(this.taskView(id, label, !!checked[id], null));\n      });\n      CHANNELS.forEach((ch) => {\n        if (seChannels.indexOf(ch.key) >= 0) {\n          const id = se.key + '|ch|' + ch.key;\n          tasks.push(this.taskView(id, CHTASK[ch.key](se.name.toLowerCase()), !!checked[id], ch.label));\n        }\n      });\n      const seasonDone = tasks.filter((t) => t.checked).length;\n      total += tasks.length; done += seasonDone;\n\n      const goal = s.seasonGoals[se.key] != null ? s.seasonGoals[se.key] : se.defGoal;\n      const income = s.seasonIncome[se.key] || 0;\n      totalGoal += goal; totalIncome += income;\n      const pct = goal > 0 ? Math.min(100, (income / goal) * 100) : 0;\n\n      return {\n        key: se.key, name: se.name, sub: se.sub,\n        tasks,\n        countLabel: seasonDone + '/' + tasks.length,\n        dotStyle: `width:11px;height:11px;border-radius:50%;flex-shrink:0;background:${se.accent}`,\n        badgeStyle: `font-size:12px;font-weight:700;color:${se.accent};background:${se.tint};padding:4px 11px;border-radius:999px`,\n\n        // selectors\n        sessionsSummary: seSessions.length ? seSessions.map((k) => SHORT[k]).join(', ') : 'Choose sessions',\n        channelsSummary: seChannels.length ? seChannels.map((k) => { const c = CHANNELS.find((x) => x.key === k); return c ? c.label : k; }).join(', ') : 'Choose channels',\n        isSessionsOpen: s.openDropdown === ('sessions|' + se.key),\n        isChannelsOpen: s.openDropdown === ('channels|' + se.key),\n        onToggleSessions: () => this.toggleDropdown('sessions|' + se.key),\n        onToggleChannels: () => this.toggleDropdown('channels|' + se.key),\n        sessionOptions: SESSIONS.map((o) => {\n          const sel = seSessions.indexOf(o.key) >= 0;\n          return { key: o.key, label: o.label, selected: sel, onToggle: () => this.toggleSeasonArr('seasonSessions', se.key, o.key), boxStyle: this.miniBox(sel) };\n        }),\n        channelOptions: CHANNELS.map((o) => {\n          const sel = seChannels.indexOf(o.key) >= 0;\n          return { key: o.key, label: o.label, selected: sel, onToggle: () => this.toggleSeasonArr('seasonChannels', se.key, o.key), boxStyle: this.miniBox(sel) };\n        }),\n\n        // income\n        incomeBoxStyle: `background:${se.tint};border-radius:13px;padding:14px 15px;margin:0 0 14px`,\n        earnedStyle: `font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:600;line-height:1;color:${se.accent}`,\n        earnedLabel: this.money(income),\n        goalLabel: this.money(goal),\n        fillStyle: `height:100%;border-radius:999px;background:${se.accent};transition:width .55s cubic-bezier(.2,.8,.2,1);min-width:0;width:${Math.round(pct * 10) / 10}%`,\n        addAmount: s.addAmounts[se.key] || '',\n        onAddChange: (e) => this.onAddChange(se.key, e),\n        onAddKey: (e) => { if (e.key === 'Enter') this.addCustom(se.key); },\n        addCustom: () => this.addCustom(se.key),\n        resetIncome: () => this.resetIncome(se.key),\n        addBtnStyle: `background:${se.accent};color:#fff;border-radius:9px;padding:0 15px;height:36px;font-size:13px;font-weight:700;cursor:pointer`,\n        quickChips: [\n          { label: '+ $250', onClick: () => this.addQuick(se.key, 250) },\n          { label: '+ $500', onClick: () => this.addQuick(se.key, 500) },\n        ],\n        isGoalOpen: s.openDropdown === ('goal|' + se.key),\n        onToggleGoal: () => this.toggleDropdown('goal|' + se.key),\n        goalOptions: GOALS.map((v) => ({ value: v, label: this.money(v), selected: v === goal, onSelect: () => this.chooseGoal(se.key, v), boxStyle: this.miniBox(v === goal) })),\n      };\n    });\n\n    const annualGoal = s.annualGoal || 16000;\n    const totalPct = annualGoal > 0 ? Math.min(100, (totalIncome / annualGoal) * 100) : 0;\n    const totalReached = totalIncome >= annualGoal && annualGoal > 0;\n    const progressPct = total ? Math.round((done / total) * 100) : 0;\n\n    return {\n      showIncome,\n      seasonsView,\n\n      totalEarnedLabel: this.money(totalIncome),\n      totalGoalLabel: this.money(annualGoal),\n      totalPct: Math.round(totalPct * 10) / 10,\n      totalPctInt: Math.round(totalPct),\n      totalStatus: totalReached ? 'Goal reached \\u2014 beautiful work' : (this.money(Math.max(0, annualGoal - totalIncome)) + ' to go'),\n      isAnnualGoalOpen: s.openDropdown === 'annualGoal',\n      onToggleAnnualGoal: () => this.toggleDropdown('annualGoal'),\n      annualGoalOptions: ANNUAL_GOALS.map((v) => ({ value: v, label: this.money(v), selected: v === annualGoal, onSelect: () => this.chooseAnnualGoal(v), boxStyle: this.miniBox(v === annualGoal) })),\n\n      anyOpen: !!s.openDropdown,\n      closeDropdown: this.closeDropdown,\n\n      progressLabel: done + ' of ' + total + ' tasks complete',\n      progressFillStyle: `height:100%;border-radius:999px;background:${this.primary()};transition:width .5s ease;width:${progressPct}%`,\n      resetChecklist: this.resetChecklist,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
